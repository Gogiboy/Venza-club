<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toyota Venza Club</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;

      /* FULL IMAGE, NO DARK OVERLAY */
      background: url('venza.jpg') no-repeat center center;
      background-size: cover;
      background-position: 50% 50%;

      transition: background-position 0.08s linear;
    }

    .buttons {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      width: 100%;
      max-width: 320px;
    }

    a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      width: 100%;
      justify-content: center;
      transition: all 0.2s ease;
      color: #fff !important;
      -webkit-tap-highlight-color: transparent;

      /* better readability without overlay */
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    a:visited {
      color: #fff !important;
    }

    a:hover {
      transform: scale(1.03);
      filter: brightness(1.05);
    }

    .max {
      background: linear-gradient(135deg, #00D4FF, #7B68EE, #8B00FF);
      box-shadow: 0 4px 15px rgba(123,104,238,0.4);
    }

    .tg {
      background: #229ED9;
      box-shadow: 0 4px 15px rgba(34,158,217,0.4);
    }

    .wa {
      background: #25D366;
      box-shadow: 0 4px 15px rgba(37,211,102,0.4);
    }

    @media (max-width: 480px) {
      body {
        padding: 15px;
      }

      a {
        font-size: 14px;
        padding: 14px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="buttons">

    <a class="max" href="https://max.ru/u/ВАШ_ХЕШИ" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>

    <a class="tg" href="https://t.me/your_channel" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M9.04 15.53l-.39 5.48c.56 0 .8-.24 1.09-.53l2.62-2.5 5.43 3.97c1 .55 1.7.26 1.96-.92l3.56-16.68c.33-1.54-.56-2.14-1.54-1.78L1.61 9.53c-1.5.58-1.48 1.42-.25 1.8l5.72 1.78L19.4 6.6c.6-.4 1.15-.18.7.22"/></svg>

  </div>

<script>
  let enabled = false;

  function updateParallax(x, y) {
    const maxOffset = 18;
    document.body.style.backgroundPosition =
      `calc(50% + ${x * maxOffset}px) calc(50% + ${y * maxOffset}px)`;
  }

  window.addEventListener('deviceorientation', (event) => {
    if (!enabled) return;

    let x = (event.gamma || 0) / 45;
    let y = (event.beta || 0) / 45;

    x = Math.max(-1, Math.min(1, x));
    y = Math.max(-1, Math.min(1, y));

    updateParallax(x, y);
  });

  document.addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') enabled = true;
      } catch (e) {}
    } else {
      enabled = true;
    }
  });
</script>

</body>
</html>
