<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toyota Venza Club</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;

      min-height: 100vh;
      min-height: 100dvh;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      padding: 10vh 16px 16px 16px;
      overflow: hidden;

      background: url('venza.jpg') no-repeat center center;
      background-size: cover;
    }

    .buttons {
      width: 100%;
      max-width: 340px;

      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      padding: 14px 18px;
      border-radius: 16px;

      text-decoration: none;
      font-weight: 600;
      font-size: 15px;

      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);

      transition: transform 0.15s ease, filter 0.15s ease;
    }

    a:active {
      transform: scale(0.97);
    }

    .max {
      background: linear-gradient(135deg, #00D4FF, #7B68EE, #8B00FF);
      box-shadow: 0 4px 14px rgba(123,104,238,0.35);
    }

    .tg {
      background: #229ED9;
      box-shadow: 0 4px 14px rgba(34,158,217,0.35);
    }

    .wa {
      background: #25D366;
      box-shadow: 0 4px 14px rgba(37,211,102,0.35);
    }

    svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      a {
        font-size: 14px;
        padding: 13px 16px;
      }
    }
  </style>
</head>
